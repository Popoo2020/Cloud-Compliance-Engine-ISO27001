<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Compliance Engine Reporting Flow</title>
  <desc id="desc">Flow from ISO control templates and sample cloud evidence into validation, aggregation, and a generated compliance summary.</desc>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .box { fill:#f8fafc; stroke:#1f2937; stroke-width:2; rx:18; }
    .merge { fill:#fff7ed; stroke:#ea580c; stroke-width:2; rx:18; }
    .out { fill:#ecfdf5; stroke:#059669; stroke-width:2; rx:18; }
    .title { font: 700 26px Arial, sans-serif; fill:#111827; }
    .label { font: 700 18px Arial, sans-serif; fill:#111827; }
    .small { font: 15px Arial, sans-serif; fill:#374151; }
    .arrow { stroke:#374151; stroke-width:3; fill:none; marker-end:url(#arrow); }
    .note { fill:#eef6ff; stroke:#2563eb; stroke-width:2; rx:14; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="title">Cloud-Compliance-Engine-ISO27001 — Evidence to Report</text>

  <rect x="70" y="90" width="250" height="90" class="box"/>
  <text x="195" y="126" text-anchor="middle" class="label">Control templates</text>
  <text x="195" y="152" text-anchor="middle" class="small">ISO-oriented metadata</text>

  <rect x="70" y="210" width="250" height="90" class="box"/>
  <text x="195" y="246" text-anchor="middle" class="label">Evidence dataset</text>
  <text x="195" y="272" text-anchor="middle" class="small">Azure / AWS samples</text>

  <rect x="420" y="140" width="250" height="110" class="merge"/>
  <text x="545" y="176" text-anchor="middle" class="label">Validation</text>
  <text x="545" y="201" text-anchor="middle" class="small">Control IDs + status</text>
  <text x="545" y="223" text-anchor="middle" class="small">schema checks</text>

  <rect x="760" y="140" width="250" height="110" class="out"/>
  <text x="885" y="176" text-anchor="middle" class="label">Generated report</text>
  <text x="885" y="201" text-anchor="middle" class="small">Markdown summary</text>
  <text x="885" y="223" text-anchor="middle" class="small">control evidence matrix</text>

  <path d="M320 135 C360 135, 380 172, 420 172" class="arrow"/>
  <path d="M320 255 C360 255, 380 218, 420 218" class="arrow"/>
  <path d="M670 195 H760" class="arrow"/>

  <rect x="250" y="330" width="700" height="56" class="note"/>
  <text x="600" y="352" text-anchor="middle" class="label">Automation baseline</text>
  <text x="600" y="373" text-anchor="middle" class="small">Tested reporting logic today · read-only live collectors can be added next</text>
</svg>
